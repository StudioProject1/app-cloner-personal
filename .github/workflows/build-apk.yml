name: Build APK (artifact)

# Clean build: compiles the debug APK and uploads it as a downloadable
# artifact. No Telegram, no secrets required. Personal-use build.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Collect APKs
        if: always()
        run: |
          mkdir -p out
          find . -path '*/build/outputs/apk/*' -name '*.apk' -exec cp {} out/ \; || true
          echo "=== APKs produced ==="
          ls -la out/ || echo "none"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-cloner-debug-apk
          path: out/*.apk
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/**
            **/*.log
          if-no-files-found: ignore
